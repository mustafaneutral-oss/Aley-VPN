name: Build Aley VPN APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build Xray library
        run: |
          cd AndroidLibXrayLite
          gomobile init
          go mod tidy
          gomobile bind -ldflags='-s -w' -androidapi 21 -target=android -o libv2ray.aar
          mkdir -p ../V2rayNG/app/libs
          cp libv2ray.aar ../V2rayNG/app/libs/

      - name: Generate signing key
        run: |
          cd V2rayNG
          keytool -genkey -v -keystore aleyvpn.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias aleyvpn \
            -storepass aleyvpn123 -keypass aleyvpn123 \
            -dname "CN=Aley VPN, OU=Dev, O=AleyVPN, L=City, ST=State, C=US"

      - name: Build signed APK
        run: |
          cd V2rayNG
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/aleyvpn.jks \
            -Pandroid.injected.signing.store.password=aleyvpn123 \
            -Pandroid.injected.signing.key.alias=aleyvpn \
            -Pandroid.injected.signing.key.password=aleyvpn123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AleyVPN-APK
          path: V2rayNG/app/build/outputs/apk/**/*.apk
